name: Backend Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_FILE: backend/Ay.WebApi.csproj
      PUBLISH_DIR: backend/publish
      REMOTE_TMP_DIR: /tmp/ay-backend-publish
      REMOTE_APP_DIR: /opt/ay/backend
      SERVICE_NAME: ay-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore "${{ env.PROJECT_FILE }}"

      - name: Publish
        run: dotnet publish "${{ env.PROJECT_FILE }}" -c Release -o "${{ env.PUBLISH_DIR }}"

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.ORACLE_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload build to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            "${{ env.PUBLISH_DIR }}/" \
            "${{ secrets.ORACLE_SSH_USER }}@${{ secrets.ORACLE_HOST }}:${{ env.REMOTE_TMP_DIR }}/"

      - name: Activate release and restart backend
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.ORACLE_SSH_USER }}@${{ secrets.ORACLE_HOST }}" "
            set -e
            sudo mkdir -p '${{ env.REMOTE_APP_DIR }}'
            sudo rsync -a --delete '${{ env.REMOTE_TMP_DIR }}/' '${{ env.REMOTE_APP_DIR }}/'
            sudo chown -R www-data:www-data '${{ env.REMOTE_APP_DIR }}'
            sudo systemctl restart '${{ env.SERVICE_NAME }}'
            sudo systemctl is-active '${{ env.SERVICE_NAME }}'
          "
