// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '35.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '24')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '36')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '35')
        kotlinVersion = findProperty('android.kotlinVersion') ?: '2.0.21'

        // NDK r27 supports 16 KB ELF alignment with ANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES.
        // This version is already installed in the local SDK, avoiding Gradle's r28 license prompt.
        ndkVersion = "27.1.12297006"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle:8.9.1')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath('com.google.gms:google-services:4.4.4')
        classpath('com.google.firebase:firebase-crashlytics-gradle:2.9.9')
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url(new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../android'))
        }
        maven {
            // Android JSC is installed from npm
            url(new File(['node', '--print', "require.resolve('jsc-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), '../dist'))
        }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}

// @react-native-voice/voice pins com.android.support:appcompat-v7:28.0.0. Jetifier can OOM on
// react-android AARs, so keep Jetifier off and redirect this legacy coordinate to AndroidX.
subprojects { subproject ->
    subproject.plugins.withId("com.android.library") {
        def nativeProjectsRequiringFlexiblePageSizes = [
            "react-native-reanimated",
            "react-native-screens",
        ]

        if (nativeProjectsRequiringFlexiblePageSizes.contains(subproject.name)) {
            subproject.android.defaultConfig.externalNativeBuild.cmake.arguments(
                "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            )
        }
    }

    subproject.configurations.configureEach { configuration ->
        configuration.resolutionStrategy.eachDependency { details ->
            if (details.requested.group == "com.android.support" && details.requested.name == "appcompat-v7") {
                details.useTarget("androidx.appcompat:appcompat:1.6.1")
                details.because("react-native-voice declares legacy support-appcompat; project is AndroidX-only")
            }
        }
    }
}
